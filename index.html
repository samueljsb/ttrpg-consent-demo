<!DOCTYPE html>
<html lang="en">
  <head>
    <title>TTRPG Consents</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  </head>
  <body>
    <header>
      <h1>TTRPG Consents (demo)</h1>
    </header>
    <main>
      <h2>Join a campaign</h2>
      <form action="./campaign.html" method="get">
        <p>
        <label>Campaign code</label>
        <input type="text" name="campaign" value="3b38518a">
        </p>

        <button>Join</button>
      </form>
    </main>
    <footer>
      <p>
        This is a demo/mock-up
        of a site to help manage lines & veils
        and other consents
        for guiding role-playing games.
      </p>
      <p>
        This site isn't actually functional,
        but demonstrates how we'd like the real thing to work.
      </p>
    </footer>
  </body>
</html>
